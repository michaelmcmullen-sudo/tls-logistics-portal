<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root { --primary: #002D54; --secondary: #1D6F42; --accent: #D64118; --bg: #f0f2f5; --white: #ffffff; --grey: #b2bec3; --border: #dfe6e9; }
    body { font-family: 'Inter', 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: #2d3436; display: flex; height: 100vh; overflow: hidden; }
    .sidebar { width: 260px; background: var(--primary); color: white; display: flex; flex-direction: column; padding: 20px 0; flex-shrink: 0; z-index: 100; }
    .logo { padding: 0 25px 30px; font-weight: 800; font-size: 1.2rem; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
    .nav-item { padding: 15px 25px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.3s; opacity: 0.7; }
    .nav-item.active { opacity: 1; background: rgba(255,255,255,0.1); border-left: 4px solid var(--accent); }
    .main-content { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; }
    header { background: var(--white); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; }
    .status-pill { padding: 6px 16px; border-radius: 20px; font-size: 12px; font-weight: 600; background: #e3f2fd; color: #1976d2; border: 1px solid #bbdefb; display: flex; align-items: center; gap: 8px; }
    .view-container { padding: 30px; overflow-y: auto; flex-grow: 1; }
    .view { display: none; animation: fadeIn 0.3s ease-out; }
    .view.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .card { background: var(--white); border-radius: 12px; padding: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 25px; border: 1px solid rgba(0,0,0,0.03); }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; }
    .field { display: flex; flex-direction: column; }
    label { font-size: 11px; font-weight: 700; margin-bottom: 6px; color: #636e72; text-transform: uppercase; }
    input, textarea, select { padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; background: #fcfcfc; }
    .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 14px; display: inline-flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-success { background: var(--secondary); color: white; }
    .table-wrapper { background: white; border-radius: 12px; overflow: hidden; border: 1px solid #ddd; display: flex; flex-direction: column; max-height: 50vh; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { position: sticky; top: 0; background: #f8f9fa; padding: 14px; text-align: left; border-bottom: 2px solid #ddd; color: var(--primary); }
    td { padding: 12px 14px; border-bottom: 1px solid #eee; white-space: nowrap; }
  </style>
</head>
<body>

  <div class="sidebar">
    <div class="logo"><i class="fas fa-box-open"></i> TLS LOGISTICS</div>
    <div class="nav-item active" onclick="showView('ops', this)"><i class="fas fa-sync"></i> Operations</div>
    <div class="nav-item" onclick="showView('shipping', this)"><i class="fas fa-truck-loading"></i> Dispatch</div>
    <div class="nav-item" onclick="showView('viewer', this)"><i class="fas fa-table"></i> Data Explorer</div>
  </div>

  <div class="main-content">
    <header>
      <div id="view-title" style="font-weight: 700; font-size: 1.1rem; color: var(--primary);">Teams Logistics Control Center</div>
      <div class="header-controls">
        <div class="status-pill" id="status"><i class="fas fa-circle-check"></i> Connected via Teams Files</div>
      </div>
    </header>

    <div class="view-container">
      
      <div id="view-ops" class="view active">
        <div class="card">
          <h2><i class="fas fa-file-import"></i> Daily Sync</h2>
          <div style="display:flex; gap:15px; align-items:flex-end;">
            <button class="btn btn-primary" onclick="triggerFileAction('syncDemandData')">TRIGGER TEAMS SYSTEM SYNC</button>
          </div>
        </div>

        <div class="card">
          <h2><i class="fas fa-filter"></i> Label Generator Export</h2>
          <div class="grid">
            <div class="field">
              <label>Model Range</label>
              <select id="filterModel">
                <option value="AM5">AM5 (+ AM7 Merge)</option>
                <option value="AM6">AM6</option>
              </select>
            </div>
            <div class="field"><label>Week Number</label><input type="text" id="filterWeek" placeholder="e.g. Wk 24"></div>
            <div class="field" style="justify-content: flex-end;">
              <button class="btn btn-success" onclick="triggerFileAction('getFilteredCarpetExport')">GENERATE EXPORT</button>
            </div>
          </div>
        </div>
      </div>

      <div id="view-shipping" class="view">
        <div class="card">
          <h2><i class="fas fa-shipping-fast"></i> Process Outbound Dispatch</h2>
          <div class="grid" style="grid-template-columns: 1fr;">
            <div class="field">
              <label>Chassis Serial Entry List (One per line or column paste)</label>
              <textarea id="chassisInput" rows="6" placeholder="Paste Chassis IDs here..."></textarea>
            </div>
          </div>
          <div style="margin-top:15px; display:flex; gap:10px;">
            <button class="btn btn-primary" onclick="submitShipping('bootkit')">SHIP BOOTKITS</button>
            <button class="btn btn-success" onclick="submitShipping('carpet')">SHIP CARPETS</button>
          </div>
        </div>
      </div>

      <div id="view-viewer" class="view">
        <div class="card">
          <h2><i class="fas fa-search"></i> Live Teams Database Explorer</h2>
          <p style="color:#636e72; font-size:13px;">Data is managed through your target file directory links.</p>
        </div>
      </div>

    </div>
  </div>

  <script>
    // --- TARGETED SHAREPOINT ENDPOINTS DERIVED FROM YOUR RESOURCE PATH ---
    const SHAREPOINT_API_ROOT = "https://adlerpelzer.sharepoint.com/sites/FixIt";
    const BUFFER_FILE_RELATIVE_PATH = "/Sdilene dokumenty/General/AML TLS/Log_Buffer.xlsx";
    const EXCEL_TABLE_API_URL = `${SHAREPOINT_API_ROOT}/_api/v2.0/sites/root/drive/root:${encodeURIComponent(BUFFER_FILE_RELATIVE_PATH)}:/workbook/tables('BufferTable')/rows`;

    function showView(viewId, element) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      document.getElementById('view-' + viewId).classList.add('active');
      if(element) element.classList.add('active');
    }

    // Appends rows directly to the Buffer Excel Table using Microsoft Graph API
    async function appendToExcelBuffer(rowsArray) {
      try {
        const response = await fetch(EXCEL_TABLE_API_URL, {
          method: "POST",
          headers: {
            "Accept": "application/json;odata=verbose",
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ values: rowsArray })
        });
        return response.ok;
      } catch (error) {
        console.error("SharePoint connection issue:", error);
        return false;
      }
    }

    async function submitShipping(type) {
      const input = document.getElementById('chassisInput').value;
      const lines = input.split('\n').map(r => r.trim()).filter(r => r.length > 0);
      
      if(lines.length === 0) { alert("Please input active chassis IDs."); return; }
      st("Appending rows to Teams buffer file...");

      const executionDate = new Date().toISOString().split('T')[0];
      
      // Structure rows array matching: [Chassis, Week, ExecutionDate]
      const rowsToAppend = lines.map(chassis => [chassis, type.toUpperCase(), executionDate]);

      const success = await appendToExcelBuffer(rowsToAppend);
      if(success) {
        alert(`Successfully appended ${lines.length} records to Log_Buffer.xlsx! Power Automate will now process them.`);
        document.getElementById('chassisInput').value = "";
      } else {
        alert("Transaction failed. Check if the file is locked open or if table names do not match.");
      }
      ready();
    }

    async function triggerFileAction(actionName) {
      const model = document.getElementById('filterModel')?.value || "N/A";
      const week = document.getElementById('filterWeek')?.value || "N/A";
      
      st("Sending action parameters to buffer...");
      // For utility commands, we insert a specialized command flag line into the spreadsheet row array
      const commandRow = [[`COMMAND:${actionName}`, model, week]];
      
      const success = await appendToExcelBuffer(commandRow);
      if(success) {
        alert(`Action request [${actionName}] sent to Teams log buffer.`);
      } else {
        alert("Action routing failed.");
      }
      ready();
    }

    function st(text) { document.getElementById('status').innerHTML = `<i class="fas fa-spinner fa-spin"></i> ${text}`; }
    function ready() { document.getElementById('status').innerHTML = `<i class="fas fa-circle-check"></i> Connected via Teams Files`; }
  </script>
</body>
</html>
